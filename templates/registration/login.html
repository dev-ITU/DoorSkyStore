{% extends "base.html" %}

{% block title %}Вход{% endblock %}

{% block content %}
<section class="auth-panel">
    <h1>Вход</h1>
    <form method="post" class="form-card">
        {% csrf_token %}
        {{ form.as_p }}
        <button class="button primary" type="submit">Войти</button>
        <p class="form-note">Нет аккаунта? <a href="{% url 'register' %}">Зарегистрироваться</a></p>
    </form>
</section>
{% endblock %}
