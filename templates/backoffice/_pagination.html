{% if page_obj.has_other_pages %}
    <nav class="office-pagination" aria-label="Страницы">
        {% if page_obj.has_previous %}
            <a class="button ghost" href="?page={{ page_obj.previous_page_number }}">Назад</a>
        {% endif %}
        <span>Страница {{ page_obj.number }} из {{ page_obj.paginator.num_pages }}</span>
        {% if page_obj.has_next %}
            <a class="button ghost" href="?page={{ page_obj.next_page_number }}">Вперед</a>
        {% endif %}
    </nav>
{% endif %}
