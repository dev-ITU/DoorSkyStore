<div class="office-table-wrap">
    <table class="office-table">
        <thead><tr><th>Сегмент</th><th>Кол-во</th><th>Сумма</th><th></th></tr></thead>
        <tbody>
            {% for row in rows %}
                <tr>
                    <td>{{ row.label }}</td>
                    <td>{{ row.count }}</td>
                    <td>{{ row.total|default:0|floatformat:0 }} руб.</td>
                    <td><div class="mini-bar"><span style="width: {{ row.width }}%"></span></div></td>
                </tr>
            {% empty %}
                <tr><td colspan="4">Данных нет.</td></tr>
            {% endfor %}
        </tbody>
    </table>
</div>
